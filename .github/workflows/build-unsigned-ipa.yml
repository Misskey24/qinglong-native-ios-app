name: Build unsigned IPA

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Build unsigned app
        run: |
          set -e
          xcodebuild \
            -project QingLongNativeApp.xcodeproj \
            -scheme QingLongNativeApp \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            build

      - name: Package unsigned IPA
        run: |
          set -e
          APP_PATH="build/Build/Products/Release-iphoneos/QingLongNativeApp.app"
          test -d "$APP_PATH"
          rm -rf Payload QingLongNativeApp-unsigned.ipa
          mkdir Payload
          cp -R "$APP_PATH" Payload/
          /usr/bin/zip -qry QingLongNativeApp-unsigned.ipa Payload

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: QingLongNativeApp-unsigned-ipa
          path: QingLongNativeApp-unsigned.ipa

      - name: Upload app artifact
        uses: actions/upload-artifact@v4
        with:
          name: QingLongNativeApp-app
          path: build/Build/Products/Release-iphoneos/QingLongNativeApp.app
